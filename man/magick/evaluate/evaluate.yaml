Abs:
  Add value to pixels and return absolute value. Converts negative values to positive.
Add:
  Add a constant value to each pixel channel. Increases brightness uniformly.
AddModulus:
  Add value to pixels modulo QuantumRange. Equivalent to Add unless the result
  exceeds the maximum value, in which case it wraps around.
And:
  Bitwise AND of pixels with value. Used for masking specific bit patterns.
Cosine:
  Apply cosine to pixels with frequency value, with 50% bias added.
  Produces a wave pattern over the color range.
Cos:
  Alias for Cosine.
Divide:
  Divide pixels by value. Used for scaling pixel values down.
Exp:
  Base-e exponential function. Works on normalized pixel values.
  Value should be negative to produce a decaying exponential.
Exponential:
  Alias for Exp. Base-e exponential function.
GaussianNoise:
  Gaussian noise. Adds Gaussian-distributed random noise.
  Simulates natural sensor noise.
ImpulseNoise:
  Impulse noise. Adds salt-and-pepper noise.
  Simulates transmission errors or dead pixels.
LaplacianNoise:
  Laplacian noise. Adds Laplacian-distributed random noise.
  Heavier tails than Gaussian.
Log:
  |
  Apply scaled logarithm to normalized pixel values. Compresses dynamic range.
  Formula: log(value * u + 1) / log(value + 1).
InverseLog:
  Apply inverse scaled logarithm to normalized pixel values.
  Reverses the Log operation.
Max:
  Maximum. Sets each pixel channel to the max of current value and constant.
  Brightens dark pixels up to the threshold.
Mean:
  Mean. Replaces each pixel with the average of its neighborhood.
  Simple blur effect.
Median:
  Median. Replaces each pixel with the median of its neighborhood.
  Effective noise reduction while preserving edges.
Min:
  Minimum. Sets each pixel channel to the min of current value and constant.
  Darkens bright pixels down to the threshold.
MultiplicativeNoise:
  Multiplicative noise. Adds noise proportional to pixel value.
  Signal-dependent noise model.
Multiply:
  Multiplication. Multiplies each pixel channel by a constant.
  Scales pixel values; useful for brightness adjustment.
Or:
  Bitwise OR. Performs bitwise OR between pixel and value.
  Used for setting specific bit patterns.
PoissonNoise:
  Poisson noise. Adds Poisson-distributed random noise.
  Models photon counting noise in imaging sensors.
Pow:
  |
  Raise normalized pixels to the power value. Related to `-gamma`:
  `-gamma 2` is equivalent to `-evaluate pow 0.5` (square root).
RootMeanSquare:
  Square the pixel and add the value.
RMS:
  Alias for RootMeanSquare.
Set:
  Set pixel equal to value. Replaces all pixel values uniformly.
LeftShift:
  Shift pixel values left by value bits (multiply pixels by 2^value).
RightShift:
  Shift pixel values right by value bits (divide pixels by 2^value).
Sine:
  Apply sine to pixels with frequency value, with 50% bias added.
  Creates periodic modulation patterns.
Sin:
  Alias for Sine.
Subtract:
  Subtraction. Subtracts a constant from each pixel channel.
  Decreases brightness uniformly.
Sum:
  Sum. Accumulates pixel channel values.
  Used for statistical calculations.
Threshold:
  Threshold. Sets pixels above value to white, below to black.
  Creates binary (bilevel) images.
ThresholdBlack:
  Threshold black. Sets pixels below value to black (zero).
  Only darkens; leaves bright pixels unchanged.
ThresholdWhite:
  Threshold white. Sets pixels above value to white (max).
  Only brightens; leaves dark pixels unchanged.
UniformNoise:
  Uniform noise. Adds uniformly distributed random noise.
  Equal probability across the noise range.
Xor:
  Bitwise XOR. Performs bitwise exclusive OR between pixel and value.
  Used for inverting specific bit patterns.
