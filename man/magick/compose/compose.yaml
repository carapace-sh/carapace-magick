Over: Source composited over the destination. The default alpha blending compose method.
  Alpha-blends the source image on top of the destination.
Clear: Both the color and the alpha of the destination are cleared. Neither the source
  nor the destination are used (except for destination size and meta-data).
In: Source-in composite. Keeps only the overlapping area of the source. Destination
  is replaced; non-overlapping areas become transparent.
Out: Source-out composite. Keeps only the non-overlapping area of the source. Overlapping
  areas become transparent.
Atop: Source-atop composite. Source is composited on top of destination but only where
  the destination has alpha.
Xor: The part of the source that lies outside of the destination is combined with
  the part of the destination that lies outside of the source. Source or Destination,
  but not both.
Multiply: Source is multiplied by destination and replaces the destination. The resultant
  color is always at least as dark as either of the two constituent colors. Multiplying
  any color with black produces black. Multiplying any color with white leaves the
  original unchanged.
Screen: Source and destination are complemented and then multiplied and then replace
  the destination. The resultant color is always at least as light as either of the
  two constituent colors.
Blend: Blend composite. Average of multiply and screen. Similar to overlay but with
  equal weighting.
Overlay: Overlay blend. Combines multiply and screen — dark areas darken, light areas
  lighten, midtones are preserved.
Darken: Darken composite. Takes the darker of source and destination per channel.
  Only pixels that are darker than the destination are shown.
Lighten: Lighten composite. Takes the lighter of source and destination per channel.
  Only pixels that are lighter than the destination are shown.
HardLight: Hard light blend. Like overlay but based on source brightness. Produces
  a harsh, high-contrast result.
SoftLight: Soft light blend. A gentler version of hard light. Produces subtle shading
  without harsh contrast.
Difference: Difference composite. Absolute difference between source and destination.
  Useful for comparing images or creating psychedelic effects.
Exclusion: Exclusion composite. Similar to difference but with lower contrast. Produces
  a softer inversion effect.
ColorDodge: Color dodge blend. Brightens destination by source color. Creates intense
  highlights and bloom effects.
ColorBurn: Color burn blend. Darkens destination by source color. Creates intense
  shadows and charring effects.
LinearDodge: Linear dodge (add) blend. Simply adds source and destination colors.
  Produces bright, washed-out results.
LinearBurn: Linear burn blend. Subtracts source from destination. Produces very dark
  results; similar to multiply but more extreme.
LinearLight: Linear light blend. Combines linear dodge and linear burn. High-contrast
  combination of the two.
VividLight: Vivid light blend. Combines color dodge and color burn. Extremely high
  contrast; produces vivid color shifts.
PinLight: Pin light blend. Replaces destination depending on source brightness. Useful
  for masking and artistic effects.
HardMix: Hard mix blend. Adds colors and thresholds at 128. Produces posterized, pop-art
  style results.
Dst: The destination is left untouched. The source image is completely ignored.
DstOver: The destination is composited over the source and the result replaces the
  destination.
DstIn: The part of the destination lying inside of the source replaces the destination.
  Areas not overlaid are cleared.
DstOut: The part of the destination lying outside of the source replaces the destination.
DstAtop: The part of the destination lying inside of the source is composited over
  the source and replaces the destination. Areas not overlaid are cleared.
Src: The source is copied to the destination. The destination is not used as input,
  though it is cleared.
SrcIn: The part of the source lying inside of the destination replaces the destination.
SrcOut: The part of the source lying outside of the destination replaces the destination.
SrcAtop: The part of the source lying inside of the destination is composited onto
  the destination.
Copy: Copy composite. Equivalent to Src but without clearing the parts of the destination
  image that are not overlaid.
CopyRed: Copy red channel. Copies only the red channel from source to destination.
  Other channels are left unchanged.
CopyGreen: Copy green channel. Copies only the green channel from source to destination.
  Other channels are left unchanged.
CopyBlue: Copy blue channel. Copies only the blue channel from source to destination.
  Other channels are left unchanged.
CopyAlpha: Copy alpha channel. Copies only the alpha channel from source to destination.
  RGB channels are left unchanged.
CopyCyan: Copy cyan channel (CMYK). Copies the cyan channel from source.
CopyMagenta: Copy magenta channel (CMYK). Copies the magenta channel from source.
CopyYellow: Copy yellow channel (CMYK). Copies the yellow channel from source.
CopyBlack: Copy black channel (CMYK). Copies the key (black) channel from source.
Plus: The source is added to the destination and replaces the destination. Useful
  for averaging or a controlled merger of two images, rather than a direct overlay.
MinusDst: Subtract the colors in the source image from the destination image. When
  transparency is involved, opaque areas are subtracted from any destination opaque
  areas.
MinusSrc: Subtract the colors in the destination image from the source image.
ModulusAdd: Add source and destination with modulus arithmetic.
ModulusSubtract: Subtract source from destination with modulus arithmetic.
DivideDst: Divide destination by source.
DivideSrc: Divide source by destination.
Bumpmap: Bumpmap composite. Uses the source as a bump map to shade the destination.
Dissolve: Dissolve the source image by the given percentage before overlaying over
  the destination.
Displace: Use the overlay image as a relative displacement map to displace the destination.
Distort: Like Displace but using absolute coordinates relative to the center of the
  overlay.
Blur: Variable Blur Mapping. Each pixel in the overlaid region is replaced with an
  Elliptical Weighted Average, scaled according to the overlay grayscale mapping.
SeamlessBlend: Seamlessly insert the overlay image onto the background image. Requires
  a mask.
SaliencyBlend: Merge overlay and background such that the most salient (most detail)
  image shows at each pixel.
ChangeMask: Replace any destination pixel that is similar to the source (per `-fuzz`)
  with transparency.
None: No composition operator is applied.
Replace: Replace the destination with the source (alias for Copy).
Mathematics: Merge source and destination according to the formula `A*Sc*Dc + B*Sc
  + C*Dc + D`. Arguments are set with `-define compose:args=A,B,C,D`.
Modulate: Modify the destination image's brightness and saturation according to a
  grayscale watermark.
Hue: Hue composite. Copy the hue of the source to the destination.
Saturate: Saturate composite. Copy the saturation of the source to the destination.
Colorize: Colorize composite. Copy the hue and saturation of the source to the destination.
Luminize: Luminize composite. Copy the luminosity of the source to the destination.
Intensity: Intensity composite. Copy the intensity of the source to the destination.
DarkenIntensity: Darken by intensity. Selects the darker of the destination and source
  by intensity.
LightenIntensity: Lighten by intensity. Selects the lighter of the destination and
  source by intensity.
Freeze: A variation of reflect mode (base and blend color inverted, the result inverted
  again).
Reflect: Useful when adding shining objects or light zones. The formula is similar
  to color dodge but the result is not as bright. Looks a bit like soft light.
Stamp: Similar to average mode. Helpful when applying relief or bump textures.
Interpolate: Combines multiply and screen mode. Looks similar for very dark or bright
  colors.
Negate: The "opposite" of difference mode. Colors between black and white become brighter.
PegtopLight: Almost equivalent to Soft-Light, but using a continuous mathematical
  formula rather than two conditionally selected formulae.
SoftDodge: Combination of color dodge and inverse color burn, but smoother. The base
  image is darkened a bit, but very bright blend colors are dodged in.
SoftBurn: Combination of color burn and inverse color dodge, but smoother. The base
  image is lightened a bit, but very dark blend colors are burned in.
Stereo: Create a stereo anaglyph from the source and destination.
RMSE: Root Mean Square Error composition.
SrcOver: Alias for Over. Source composited over the destination.
