Kapur:
  Maximum entropy thresholding. Maximizes the entropy of the foreground
  and background distributions.
OTSU:
  Cluster-based image thresholding. Minimizes within-class variance
  between foreground and background. The most widely used automatic
  thresholding algorithm.
Triangle:
  Geometric thresholding. Constructs a line between the histogram peak
  and the far end, then finds the maximum distance point. Works well
  for skewed histograms.
Undefined:
  No method specified. Equivalent to OTSU.
