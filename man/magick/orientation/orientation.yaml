Undefined: |
  No orientation tag. Orientation is unknown.
TopLeft: |
  EXIF 1: Top-left orientation. Row 0 is at the top, column 0 is at the left.
  The standard computer graphics orientation. Do nothing.
TopRight: |
  EXIF 2: Top-right orientation. Row 0 is at the top, column 0 is at the right.
  Flip horizontally from the standard.
BottomRight: |
  EXIF 3: Bottom-right orientation. Row 0 is at the bottom, column 0 is at the right.
  Rotated 180 degrees from the standard.
BottomLeft: |
  EXIF 4: Bottom-left orientation. Row 0 is at the bottom, column 0 is at the left.
  Flip vertically from the standard.
LeftTop: |
  EXIF 5: Left-top orientation. Row 0 is at the left, column 0 is at the top.
  Rotate 90 degrees and flip horizontally (transpose).
RightTop: |
  EXIF 6: Right-top orientation. Row 0 is at the right, column 0 is at the top.
  Rotate 90 degrees clockwise from the standard.
RightBottom: |
  EXIF 7: Right-bottom orientation. Row 0 is at the right, column 0 is at the bottom.
  Rotate 90 degrees and flip vertically (transverse).
LeftBottom: |
  EXIF 8: Left-bottom orientation. Row 0 is at the left, column 0 is at the bottom.
  Rotate 270 degrees (or 90 degrees counter-clockwise) from the standard.
