sRGB:
  Standard RGB color space. The default colorspace for most images and web graphics.
  Uses gamma-corrected values optimized for display.
RGB:
  Linear RGB color space. Uses linear light values without gamma correction.
  Used for physically accurate blending and compositing.
Gray:
  Grayscale color space. Single-channel luminance.
  Common for black-and-white images.
CMYK:
  Cyan, Magenta, Yellow, Key (black). Used for print color separation.
  Subtractively mixes ink colors to produce the desired hue.
CMY:
  Cyan, Magenta, Yellow. Three-component print model without black separation.
  Rarely used directly — CMYK is preferred for print.
Lab:
  CIE L*a*b* color space. Perceptually uniform color model.
  L* is lightness, a* is green–red, b* is blue–yellow.
LCHab:
  CIE LCH(ab) color space. Polar form of Lab.
  L is lightness, C is chroma, H is hue angle.
Luv:
  CIE L*u*v* color space. Another perceptually uniform model.
  Designed for uniform chromaticity scaling.
LCHuv:
  CIE LCH(uv) color space. Polar form of Luv.
  L is lightness, C is chroma, H is hue angle.
OHTA:
  OHTA color space. Uses principal components of Lab.
  YI, CI, and QI channels.
XYZ:
  CIE XYZ color space. Device-independent tristimulus values.
  The reference color space from which others are derived.
Log:
  Log color space. Logarithmic encoding of luminance.
  Used for high dynamic range imagery.
ColorspaceAlpha:
  Generic alpha channel. Metadata flag — not a standalone colorspace.
Transparent:
  Transparent colorspace. All pixels are fully transparent.
  Used to create transparent image layers.
Oklab:
  Oklab color space. Improved perceptually uniform model.
  Better hue linearity than CIE Lab.
Oklch:
  Oklch color space. Polar form of Oklab.
  L is lightness, C is chroma, H is hue angle.
Adobe98:
  Adobe RGB 1998 color space. Wide gamut RGB for print.
CAT02LMS:
  CAT02 LMS color space. Cone response values for chromatic adaptation.
CIELab:
  CIE L*a*b* color space. Same as Lab.
DisplayP3:
  Display P3 color space. Wide gamut RGB for modern displays.
HCL:
  HCL color space. Hue, Chroma, Luminance.
HCLp:
  HCLp color space. Polar form of HCL with improved hue uniformity.
HSB:
  HSB color space. Hue, Saturation, Brightness (like a cone peak downward).
HSI:
  HSI color space. Hue, Saturation, Intensity.
HSL:
  HSL color space. Hue, Saturation, Lightness (double cone, peaks top and bottom).
HSV:
  HSV color space. Hue, Saturation, Value.
HWB:
  HWB color space. Hue, Whiteness, Blackness.
Jzazbz:
  Jzazbz color space. Perceptually uniform color model for HDR.
LCH:
  LCH color space. Lightness, Chroma, Hue (same as LCHab).
LinearGray:
  Linear Gray color space. Grayscale with linear light values.
LMS:
  LMS color space. Long, Medium, Short cone response values.
ProPhoto:
  ProPhoto RGB color space. Extremely wide gamut for photography.
Rec601YCbCr:
  Rec. 601 Y'CbCr color space. Standard definition video luma and chroma.
Rec709YCbCr:
  Rec. 709 Y'CbCr color space. High definition video luma and chroma.
scRGB:
  scRGB color space. Extended gamut RGB. Requires HDRI support.
xyY:
  CIE xyY color space. Chromaticity coordinates and luminance.
YCbCr:
  Y'CbCr color space. Luma and blue/red chroma difference.
YDbDr:
  YDbDr color space. SECAM analog video color space.
YCC:
  YCC color space. Kodak PhotoCD YCC encoding.
YIQ:
  YIQ color space. NTSC analog video color space.
YPbPr:
  Y'PbPr color space. Component analog video color space.
YUV:
  YUV color space. PAL analog video color space.
