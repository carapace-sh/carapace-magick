char: 8-bit character storage. Unsigned byte per channel value. Range [0, 255]. Most
  common for standard images.
short: 16-bit integer storage. Unsigned short per channel value. Range [0, 65535].
  Used for higher precision images.
integer: 32-bit integer storage. Unsigned int per channel value. Range [0, 4294967295].
  High dynamic range support.
float: 32-bit floating-point storage. IEEE 754 single precision. Supports HDR values
  beyond [0, 1]. Common for scientific imaging.
double: 64-bit floating-point storage. IEEE 754 double precision. Maximum precision
  for computational accuracy.
long: Long integer storage. Platform-dependent size.
quantum: Native pixel depth of the ImageMagick build. Depends on the compile-time
  `MAGICKCORE_QUANTUM_DEPTH` setting.
Char: Alias for char. 8-bit character storage.
Double: Alias for double. 64-bit floating-point storage.
Float: Alias for float. 32-bit floating-point storage.
Long: Alias for long. Long integer storage.
LongLong: Long long integer storage. 64-bit integer on most platforms.
Quantum: Alias for quantum. Native pixel depth of the ImageMagick build.
Short: Alias for short. 16-bit integer storage.
